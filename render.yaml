# Render deployment configuration
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: telemod-bot
    runtime: docker
    healthCheckPath: /healthz
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false        # set manually in Render dashboard
      - key: DATABASE_URL
        sync: false        # set manually in Render dashboard
      - key: BOT_UPDATE_WORKERS
        value: "32"
      - key: BOT_METRIC_QUEUE_SIZE
        value: "2048"
      - key: BOT_DAILY_REPORT_CRON
        value: "0 0 * * *"

      - key: BOT_DELETE_WEBHOOK_ON_START
        value: "true"
      - key: BOT_DROP_PENDING_UPDATES_ON_START
        value: "false"
      - key: BOT_DISABLE_DB_POLLING_LOCK
        value: "false"
